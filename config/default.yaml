# ============================================================
# Multi-LoRA AES — Default Configuration
# ============================================================

model:
  name: "meta-llama/Llama-3.1-8B-Instruct"
  quantization: "4bit"              # BitsAndBytes NF4 for training
  torch_dtype: "bfloat16"
  attn_implementation: "flash_attention_2"
  max_seq_length: 1024

lora:
  r: 8                              # LoRA rank
  lora_alpha: 16                    # Scaling factor (alpha/r = 2)
  lora_dropout: 0.05
  target_modules:
    - "q_proj"
    - "k_proj"
    - "v_proj"
    - "o_proj"
  task_type: "CAUSAL_LM"
  bias: "none"

training:
  num_epochs: 5
  per_device_batch_size: 4
  gradient_accumulation_steps: 4    # Effective batch size = 16
  learning_rate: 2.0e-4
  weight_decay: 0.01
  warmup_ratio: 0.1
  lr_scheduler_type: "cosine"
  max_grad_norm: 1.0
  fp16: false
  bf16: true
  logging_steps: 10
  save_strategy: "epoch"
  seed: 42

data:
  raw_dir: "data/raw"
  processed_dir: "data/processed"
  essay_sets: [1, 2, 3, 4, 5, 6, 7, 8]
  val_split: 0.1
  test_split: 0.1
  max_essay_length: 800             # Tokens (truncate longer essays)

evaluation:
  metrics:
    - "qwk"
    - "accuracy"
    - "confusion_matrix"
  num_samples: -1                   # -1 = all test samples

serving:
  engine: "vllm"
  max_loras: 8                      # Max concurrent LoRA adapters
  gpu_memory_utilization: 0.95
  max_model_len: 1024

paths:
  output_dir: "outputs"
  adapters_dir: "/home/g623dks/outputs/adapters"
  results_dir: "outputs/results"
  logs_dir: "outputs/logs"
